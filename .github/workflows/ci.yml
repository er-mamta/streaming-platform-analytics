name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project and lint dependency
        run: pip install -e '.[dev]'
      - name: Ruff
        run: ruff check src tests dashboard airflow
      - name: Unit and integration tests
        run: python -m unittest discover -s tests -v
      - name: Reproducible local pipeline
        run: make demo

